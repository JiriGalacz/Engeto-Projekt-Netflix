<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Výběr filmů</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/filmy.css">
</head>
<body>
    <main>
        <h2>Vyhledejte si svůj oblíbený film</h2>
        
        <div class="filter-section">
            <label for="movie-filter">Vyberte téma:</label>
            <select id="movie-filter">
                <option value="" disabled selected>Vyberte...</option>
                <option value="girl">Girl</option>
                <option value="boy">Boy</option>
                <option value="love">Love</option>
                </select>
        </div>

        <section id="movie-gallery" class="gallery-grid">
            </section>
    </main>
    <script type="module" src="scripts/main.js"></script>
</body>
</html>

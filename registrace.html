<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Registrace</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/registrace.css">
</head>
<body>
    <main>
        <h2>Vytvořte si účet</h2>
        <form id="registration-form">
            
            <div class="input-group">
                <label for="user-email">E-mailová adresa:</label>
                <input type="email" id="user-email" name="email" required placeholder="např. novak@email.cz">
            </div>

            <div class="input-group">
                <label for="user-password">Heslo:</label>
                <input type="password" id="user-password" name="password" required minlength="8">
            </div>

            <div class="input-group">
                <label for="user-phone">Telefonní číslo (volitelné):</label>
                <input type="tel" id="user-phone" name="phone" pattern="[0-9]{9}" placeholder="123456789">
            </div>

            <button type="submit">Zaregistrovat se</button>
        </form>
    </main>
</body>
</html>
